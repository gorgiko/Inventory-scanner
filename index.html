<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Баркод скенер за попис на ОС</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  #scanner { width: 100%; max-width: 400px; margin-bottom: 20px; border: 2px solid #ccc; }
  #scanner.success { border-color: green; }
  input, select, textarea, button { display: block; margin: 10px 0; width: 100%; padding: 8px; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
</style>
</head>
<body>

<h2>Баркод скенер за попис на ОС</h2>

<div id="scanner"></div>

<form id="inventoryForm">
  <input type="text" id="barcode" placeholder="Инвентарен број" readonly>
  <input type="text" id="location" placeholder="Location Number" required>
  <select id="condition" required>
    <option value="">Изберете состојба на средството</option>
    <option value="OK">Се користи</option>
    <option value="Damaged">За расход</option>
    <option value="Needs Repair">За донација</option>
  </select>
  <textarea id="description" placeholder="Опис/забелешка"></textarea>
  <button type="submit">Зачувај</button>
</form>

<h3>Saved Entries</h3>
<table id="inventoryTable">
  <thead>
    <tr>
      <th>Barcode</th>
      <th>Location</th>
      <th>Condition</th>
      <th>Description</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
const scannerDiv = document.getElementById("scanner");
const barcodeInput = document.getElementById("barcode");

// Audio setup
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
beep.preload = "auto";
let audioUnlocked = false;

// Unlock audio on first user tap
document.body.addEventListener("click", () => {
  if (!audioUnlocked) {
    beep.play().then(() => {
      beep.pause();
      beep.currentTime = 0;
      audioUnlocked = true;
      console.log("Audio unlocked");
    }).catch(err => console.log("Audio unlock failed:", err));
  }
}, { once: true });

// Inventory data
let inventory = JSON.parse(localStorage.getItem("inventoryData") || "[]");
const tableBody = document.querySelector("#inventoryTable tbody");

// Render inventory table
function renderTable() {
  tableBody.innerHTML = "";
  inventory.forEach(entry => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${entry.barcode}</td>
                    <td>${entry.location}</td>
                    <td>${entry.condition}</td>
                    <td>${entry.description}</td>`;
    tableBody.appendChild(tr);
  });
}
renderTable();

// Start QR & barcode scanner
const html5QrCode = new Html5Qrcode("scanner");
const config = { 
  fps: 10, 
  qrbox: 250,
  formatsToSupport: [
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.DATA_MATRIX,
    Html5QrcodeSupportedFormats.PDF_417,
    Html5QrcodeSupportedFormats.AZTEC
  ],
  experimentalFeatures: { useBarCodeDetectorIfSupported: true }
};

// Scanner callback
function onScanSuccess(decodedText) {
  barcodeInput.value = decodedText;
  scannerDiv.classList.add("success");
  setTimeout(() => scannerDiv.classList.remove("success"), 200);
  if (audioUnlocked) {
    beep.currentTime = 0;
    beep.play().catch(() => {});
  }
}

// Start camera (rear first, fallback to front)
html5QrCode.start(
  { facingMode: { exact: "environment" } },
  config,
  onScanSuccess
).catch(err => {
  console.warn("Rear camera failed, fallback to default camera", err);
  html5QrCode.start({ facingMode: "user" }, config, onScanSuccess)
    .catch(err2 => console.error("Fallback camera failed:", err2));
});

// Handle form submission
document.getElementById("inventoryForm").addEventListener("submit", e => {
  e.preventDefault();
  const entry = {
    barcode: barcodeInput.value,
    location: document.getElementById("location").value,
    condition: document.getElementById("condition").value,
    description: document.getElementById("description").value
  };
  if (!entry.barcode) { alert("Scan a barcode first!"); return; }
  inventory.push(entry);
  localStorage.setItem("inventoryData", JSON.stringify(inventory));
  renderTable();
  e.target.reset();
  barcodeInput.value = "";
});
</script>
</body>
</html>
