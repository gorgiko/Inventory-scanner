<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Баркод скенер за попис на ОС</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

#scanner {
  width: 100%;
  max-width: 400px;
  margin-bottom: 20px;
  border: 2px solid #ccc;
}

#scanner.success {
  border-color: green;
}

#message {
  font-weight: bold;
  margin-bottom: 10px;
}

input:not([type="checkbox"]), select, textarea, button {
  display: block;
  margin: 10px 0;
  width: 100%;
  padding: 8px;
  font-size: 16px;
}

input[type="checkbox"] {
  width: auto;
  transform: scale(1.2);
}

label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 10px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
}
</style>
</head>
<body>

<h2>Баркод скенер за попис на ОС</h2>

<div id="scanner"></div>
<div id="message"></div>

<form id="inventoryForm">
  <input type="text" id="barcode" placeholder="Инвентарен број" readonly>

  <label>
    <input type="checkbox" id="podrum">
    Подрум
  </label>

  <label>
    <input type="checkbox" id="sistemsala">
    Систем сала
  </label>

  <input type="text" id="location" placeholder="Број на канцеларија" required>

  <select id="condition" required>
    <option value="">Изберете состојба</option>
    <option value="Се користи">Се користи</option>
    <option value="За расход">За расход</option>
    <option value="За донација">За донација</option>
  </select>

  <textarea id="description" placeholder="Опис/Забелешка"></textarea>

  <button type="submit">Зачувај</button>
</form>

<h3>Зачувани податоци</h3>
<table id="inventoryTable">
  <thead>
    <tr>
      <th>Инв.број</th>
      <th>Канцеларија</th>
      <th>Состојба</th>
      <th>Опис</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const scannerDiv = document.getElementById("scanner");
const barcodeInput = document.getElementById("barcode");
const tableBody = document.querySelector("#inventoryTable tbody");
const messageDiv = document.getElementById("message");

const locationInput = document.getElementById("location");
const podrumCheckbox = document.getElementById("podrum");
const sistemSalaCheckbox = document.getElementById("sistemsala");

let inventory = [];
let lastScanned = null;

/* =========================
   CHECKBOX LOGIC
========================= */
function updateLocationFromCheckboxes() {
  if (podrumCheckbox.checked) {
    locationInput.value = "Подрум";
    locationInput.disabled = true;
    locationInput.removeAttribute("required");
    sistemSalaCheckbox.checked = false;
  } 
  else if (sistemSalaCheckbox.checked) {
    locationInput.value = "Систем сала";
    locationInput.disabled = true;
    locationInput.removeAttribute("required");
    podrumCheckbox.checked = false;
  } 
  else {
    locationInput.value = "";
    locationInput.disabled = false;
    locationInput.setAttribute("required", true);
  }
}

podrumCheckbox.addEventListener("change", updateLocationFromCheckboxes);
sistemSalaCheckbox.addEventListener("change", updateLocationFromCheckboxes);

/* =========================
   INSTANT BEEP + VIBRATION
========================= */
function playBeep() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    const oscillator = ctx.createOscillator();
    const gain = ctx.createGain();
    oscillator.type = "square";
    oscillator.frequency.value = 1000; // Hz
    gain.gain.value = 0.1; // volume
    oscillator.connect(gain);
    gain.connect(ctx.destination);
    oscillator.start();
    oscillator.stop(ctx.currentTime + 0.1); // duration 0.1s
  } catch(e) {
    console.warn("Beep failed:", e);
  }
}

/* =========================
   MESSAGE
========================= */
function showMessage(msg, isError=false) {
  messageDiv.style.color = isError ? "red" : "green";
  messageDiv.textContent = msg;
  setTimeout(() => messageDiv.textContent = "", 2000);
}

/* =========================
   TABLE
========================= */
function renderTable() {
  tableBody.innerHTML = "";
  inventory.forEach(entry => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${entry.barcode}</td>
      <td>${entry.location}</td>
      <td>${entry.condition}</td>
      <td>${entry.description}</td>
    `;
    tableBody.appendChild(tr);
  });
}

/* =========================
   SCANNER
========================= */
const html5QrCode = new Html5Qrcode("scanner");

const config = { 
  fps: 10,
  qrbox: 250,
  formatsToSupport: [
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.DATA_MATRIX,
    Html5QrcodeSupportedFormats.PDF_417,
    Html5QrcodeSupportedFormats.AZTEC
  ],
  experimentalFeatures: { useBarCodeDetectorIfSupported: true }
};

function onScanSuccess(decodedText) {
  if (decodedText !== lastScanned) {
    barcodeInput.value = decodedText;
    scannerDiv.classList.add("success");
    setTimeout(() => scannerDiv.classList.remove("success"), 200);

    playBeep();
    navigator.vibrate?.(120); // mobile vibration

    lastScanned = decodedText;
  }
}

function startScanner() {
  html5QrCode.start(
    { facingMode: { exact: "environment" } },
    config,
    onScanSuccess
  ).catch(() => {
    html5QrCode.start({ facingMode: "user" }, config, onScanSuccess);
  });
}

startScanner();

/* =========================
   SUBMIT
========================= */
document.getElementById("inventoryForm").addEventListener("submit", e => {
  e.preventDefault();

  const entry = {
    barcode: barcodeInput.value,
    location: locationInput.value,
    condition: document.getElementById("condition").value,
    description: document.getElementById("description").value
  };

  if (!entry.barcode) {
    showMessage("Скенирај баркод!", true);
    return;
  }

  const webAppUrl = "https://script.google.com/macros/s/AKfycbwNO3rEVuBVLkrNsKpPqffnUKD4QE6mHKl0rr9StayedmTuX8qIHZVZevES4DzDeNV2MA/exec"; // <-- replace with your Google Apps Script URL

  fetch(webAppUrl, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(entry)
  })
  .then(res => res.text())
  .then(text => {
    let response;
    try { response = JSON.parse(text); }
    catch { response = { status:"error", message:text }; }

    if (response.status === "success") {
      inventory.push(entry);
      renderTable();

      document.getElementById("inventoryForm").reset();

      locationInput.disabled = false;
      locationInput.setAttribute("required", true);

      barcodeInput.value = "";
      lastScanned = null;

      showMessage("Зачувано!");
    } else {
      showMessage("Error: " + response.message, true);
    }
  })
  .catch(err => {
    console.error("Fetch error:", err);
    showMessage("Грешка при зачувување!", true);
  });
});
</script>

<footer style="margin-top:40px; text-align:center; font-size:14px; color:#666;">
  © 2026 GorgiKo. Сите права задржани.
</footer>

</body>
</html>
