<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Баркод скенер за попис на ОС</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  #scanner { width: 100%; max-width: 400px; margin-bottom: 20px; border: 2px solid #ccc; }
  #scanner.success { border-color: green; }
  input, select, textarea, button { display: block; margin: 10px 0; width: 100%; padding: 8px; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
</style>
</head>
<body>

<h2>Баркод скенер за попис на ОС</h2>

<div id="scanner"></div>

<form id="inventoryForm">
  <input type="text" id="barcode" placeholder="Инвентарен број" readonly>
  <input type="text" id="location" placeholder="Број на канцеларија" required>
  <select id="condition" required>
    <option value="">Изберете состојба на средството</option>
    <option value="OK">Се користи</option>
    <option value="Damaged">За расход</option>
    <option value="Needs Repair">За донација</option>
  </select>
  <textarea id="description" placeholder="Опис/забелешка"></textarea>
  <button type="submit">Зачувај</button>
</form>

<h3>Saved Entries</h3>
<table id="inventoryTable">
  <thead>
    <tr>
      <th>Barcode</th>
      <th>Location</th>
      <th>Condition</th>
      <th>Description</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
const scannerDiv = document.getElementById("scanner");
const barcodeInput = document.getElementById("barcode");

// Audio setup
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
beep.preload = "auto";
let audioUnlocked = false;
document.body.addEventListener("click", () => {
  if (!audioUnlocked) {
    beep.play().then(() => { beep.pause(); beep.currentTime = 0; audioUnlocked = true; }).catch(()=>{});
  }
}, { once: true });

// Inventory data (UI table only, optional local storage)
let inventory = [];
const tableBody = document.querySelector("#inventoryTable tbody");

// Render table
function renderTable() {
  tableBody.innerHTML = "";
  inventory.forEach(entry => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${entry.barcode}</td>
                    <td>${entry.location}</td>
                    <td>${entry.condition}</td>
                    <td>${entry.description}</td>`;
    tableBody.appendChild(tr);
  });
}

// QR & barcode scanner
const html5QrCode = new Html5Qrcode("scanner");
const config = { 
  fps: 10, 
  qrbox: 250,
  formatsToSupport: [
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.DATA_MATRIX,
    Html5QrcodeSupportedFormats.PDF_417,
    Html5QrcodeSupportedFormats.AZTEC
  ],
  experimentalFeatures: { useBarCodeDetectorIfSupported: true }
};
function onScanSuccess(decodedText) {
  barcodeInput.value = decodedText;
  scannerDiv.classList.add("success");
  setTimeout(() => scannerDiv.classList.remove("success"), 200);
  if (audioUnlocked) { beep.currentTime = 0; beep.play().catch(()=>{}); }
}
html5QrCode.start({ facingMode: { exact: "environment" } }, config, onScanSuccess)
.catch(err => html5QrCode.start({ facingMode: "user" }, config, onScanSuccess).catch(()=>{}));

// Form submission: send to Google Sheets
document.getElementById("inventoryForm").addEventListener("submit", e => {
  e.preventDefault();
  
  const entry = {
    barcode: barcodeInput.value,
    location: document.getElementById("location").value,
    condition: document.getElementById("condition").value,
    description: document.getElementById("description").value
  };
  
  if (!entry.barcode) { alert("Scan a barcode first!"); return; }

  // Replace with your Google Apps Script Web App URL
  const webAppUrl = "YOUR_WEB_APP_URL_HERE";
  
  fetch(webAppUrl, {
    method: "POST",
    body: JSON.stringify(entry)
  })
  .then(res => res.json())
  .then(response => {
    if (response.status === "success") {
      inventory.push(entry);
      renderTable();
      e.target.reset();
      barcodeInput.value = "";
      alert("Saved to Google Sheet!");
    } else {
      alert("Error saving: " + response.message);
    }
  })
  .catch(err => {
    console.error(err);
    alert("Failed to save to Google Sheet.");
  });
});
</script>
</body>
</html>
