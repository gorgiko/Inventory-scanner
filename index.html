<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Баркод скенер за попис на ОС</title>

<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  #scanner { width: 100%; max-width: 400px; margin-bottom: 20px; border: 2px solid #ccc; }
  #scanner.success { border-color: green; }
  #message { font-weight: bold; margin-bottom: 10px; }

  input, select, textarea, button {
    display: block;
    margin: 10px 0;
    width: 100%;
    padding: 8px;
    font-size: 16px;
  }

  label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
  }

  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
</style>
</head>
<body>

<h2>Баркод скенер за попис на ОС</h2>

<div id="scanner"></div>
<div id="message"></div>

<form id="inventoryForm">
  <input type="text" id="barcode" placeholder="Инвентарен број" readonly>

  <!-- Podrum checkbox -->
  <label>
    <input type="checkbox" id="podrum">
    Podrum
  </label>

  <input type="text" id="location" placeholder="Број на канцеларија" required>

  <select id="condition" required>
    <option value="">Изберете состојба на средството</option>
    <option value="Се користи">Се користи</option>
    <option value="За расход">За расход</option>
    <option value="За донација">За донација</option>
  </select>

  <textarea id="description" placeholder="Опис/забелешка"></textarea>

  <button type="submit">Зачувај</button>
</form>

<h3>Зачувани податоци</h3>
<table id="inventoryTable">
  <thead>
    <tr>
      <th>Инв.број</th>
      <th>Канцеларија</th>
      <th>Состојба</th>
      <th>Опис</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
const scannerDiv = document.getElementById("scanner");
const barcodeInput = document.getElementById("barcode");
const tableBody = document.querySelector("#inventoryTable tbody");
const messageDiv = document.getElementById("message");

const locationInput = document.getElementById("location");
const podrumCheckbox = document.getElementById("podrum");

let inventory = [];
let lastScanned = null;

// ✅ Podrum logic
podrumCheckbox.addEventListener("change", () => {
  if (podrumCheckbox.checked) {
    locationInput.value = "Podrum";
    locationInput.disabled = true;
    locationInput.removeAttribute("required");
  } else {
    locationInput.value = "";
    locationInput.disabled = false;
    locationInput.setAttribute("required", true);
  }
});

// Audio
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
beep.preload = "auto";
let audioUnlocked = false;

document.body.addEventListener("click", () => {
  if (!audioUnlocked) {
    beep.play().then(() => {
      beep.pause();
      beep.currentTime = 0;
      audioUnlocked = true;
    }).catch(()=>{});
  }
}, { once: true });

function playBeep() {
  if (!audioUnlocked) return;
  const sound = beep.cloneNode();
  sound.play().catch(()=>{});
}

function showMessage(msg, isError=false) {
  messageDiv.style.color = isError ? "red" : "green";
  messageDiv.textContent = msg;
  setTimeout(() => { messageDiv.textContent = ""; }, 2000);
}

function renderTable() {
  tableBody.innerHTML = "";
  inventory.forEach(entry => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${entry.barcode}</td>
                    <td>${entry.location}</td>
                    <td>${entry.condition}</td>
                    <td>${entry.description}</td>`;
    tableBody.appendChild(tr);
  });
}

// Scanner
const html5QrCode = new Html5Qrcode("scanner");
const config = { 
  fps: 10, 
  qrbox: 250,
  formatsToSupport: [
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.DATA_MATRIX,
    Html5QrcodeSupportedFormats.PDF_417,
    Html5QrcodeSupportedFormats.AZTEC
  ],
  experimentalFeatures: { useBarCodeDetectorIfSupported: true }
};

function onScanSuccess(decodedText) {
  if (decodedText !== lastScanned) {
    barcodeInput.value = decodedText;
    scannerDiv.classList.add("success");
    setTimeout(() => scannerDiv.classList.remove("success"), 200);
    playBeep();
    lastScanned = decodedText;
  }
}

function startScanner() {
  html5QrCode.start(
    { facingMode: { exact: "environment" } },
    config,
    onScanSuccess
  ).catch(() => {
    html5QrCode.start({ facingMode: "user" }, config, onScanSuccess);
  });
}
startScanner();

// Submit
document.getElementById("inventoryForm").addEventListener("submit", e => {
  e.preventDefault();

  const entry = {
    barcode: barcodeInput.value,
    location: locationInput.value,
    condition: document.getElementById("condition").value,
    description: document.getElementById("description").value
  };

  if (!entry.barcode) {
    showMessage("Скенирај го баркодот!", true);
    return;
  }

  const webAppUrl = "https://script.google.com/macros/s/AKfycby3XP0od_6LvoPUl70gBsUIbNTS2NDCrwcKmHGR7mfOJLXP2G9MHBmdyMdgaijyIZ-ung/exec";

  fetch(webAppUrl, {
    method: "POST",
    body: JSON.stringify(entry)
  })
  .then(res => res.text())
  .then(text => {
    let response = {};
    try { response = JSON.parse(text); } catch(e) { response = { status:"error", message:text }; }

    if (response.status === "success") {
      inventory.push(entry);
      renderTable();
      document.getElementById("inventoryForm").reset();

      locationInput.disabled = false;
      locationInput.setAttribute("required", true);

      barcodeInput.value = "";
      lastScanned = null;

      showMessage("Зачувано во Google Sheet!");
    } else {
      showMessage("Error saving: " + response.message, true);
    }
  })
  .catch(() => {
    showMessage("Грешка во зачувување во Google Sheet.", true);
  });
});
</script>
</body>
</html>
