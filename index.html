<!DOCTYPE html>
<html lang="mk">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Баркод скенер за попис на ОС
</title>


<!-- ZXING BARCODE LIBRARY -->
<script src="https://unpkg.com/@zxing/library@latest"></script>


<style>


*{
box-sizing:border-box;
}



body{

margin:0;

font-family:Arial,sans-serif;

background:#f3f3f3;

}



/* =========================
FULL SCREEN CAMERA
========================= */


#cameraContainer{


width:100%;

height:70vh;

background:black;

position:relative;

overflow:hidden;

}



#scanner{


width:100%;

height:100%;

}



#scanner video{


width:100% !important;

height:100% !important;

object-fit:cover;


}




/* SCAN FRAME */


.scan-box{


position:absolute;

top:50%;

left:50%;

transform:
translate(-50%,-50%);


width:85%;

height:220px;


border:3px solid #00ff00;

border-radius:15px;


}



.scan-line{


position:absolute;

width:100%;

height:3px;

background:red;


animation:
moveLine 2s infinite;


}



@keyframes moveLine{


0%{

top:0;

}


50%{

top:100%;

}


100%{

top:0;

}


}






/* CAMERA BUTTONS */


.camera-buttons{


position:absolute;

bottom:20px;

left:0;

right:0;


display:flex;

justify-content:center;

gap:10px;


}



.camera-buttons button{


padding:12px 18px;

border:none;

border-radius:25px;

font-size:16px;

background:white;


}






/* =========================
CONTENT
========================= */


#content{


padding:15px;

}



h2{


text-align:center;

}



#message{


text-align:center;

font-weight:bold;

height:25px;

}




input,
select,
textarea,
button{


width:100%;

padding:12px;

margin:8px 0;

font-size:16px;


}




textarea{

height:90px;

}




label{


display:flex;

align-items:center;

gap:10px;

margin:10px 0;

}



input[type="checkbox"]{


width:auto;

transform:scale(1.3);


}





/* TABLE */


table{


width:100%;

border-collapse:collapse;

background:white;


}



th,
td{


border:1px solid #ccc;

padding:8px;

font-size:14px;


}




.success{


border:5px solid lime;


}



</style>


</head>



<body>



<!-- =========================
CAMERA
========================= -->


<div id="cameraContainer">


<div id="scanner"></div>



<div class="scan-box">

<div class="scan-line"></div>

</div>




<div class="camera-buttons">


<button id="startCamera">

📷 Start

</button>



<button id="stopCamera">

⛔ Stop

</button>



<button id="torch">

🔦 Flash

</button>


</div>



</div>






<div id="content">



<h2>
Баркод скенер за попис на ОС
</h2>




<div id="message"></div>




<form id="inventoryForm">



<input
type="text"
id="barcode"
placeholder="Инвентарен број"
readonly>





<label>

<input
type="checkbox"
id="podrum">

Подрум

</label>





<label>

<input
type="checkbox"
id="sistemsala">

Систем сала

</label>





<input
type="text"
id="location"
placeholder="Внесете број на канцеларија"
required>






<select id="condition" required>


<option value="">
Изберете состојба
</option>


<option value="Се користи">
Се користи
</option>


<option value="За расход">
За расход
</option>


<option value="За донација">
За донација
</option>


</select>






<textarea
id="description"
placeholder="Опис/Забелешка">
</textarea>





<button type="submit">

💾 Зачувај

</button>




</form>






<h3>
Зачувани податоци
</h3>





<table id="inventoryTable">


<thead>

<tr>

<th>
Инв.број
</th>


<th>
Локација
</th>


<th>
Состојба
</th>


<th>
Опис
</th>


</tr>


</thead>



<tbody>

</tbody>



</table>




</div>
<script>


/* =========================
   ELEMENTS
========================= */


const scannerDiv =
document.getElementById("scanner");


const barcodeInput =
document.getElementById("barcode");


const messageDiv =
document.getElementById("message");



let codeReader =
new ZXing.BrowserMultiFormatReader();



let videoElement =
null;


let scanning=false;


let lastScanned="";


let currentTrack=null;







/* =========================
   MESSAGE
========================= */


function showMessage(text,error=false){


messageDiv.innerHTML=text;


messageDiv.style.color =
error ? "red":"green";



setTimeout(()=>{

messageDiv.innerHTML="";

},2500);



}







/* =========================
   BEEP
========================= */


let audioCtx=null;



function initAudio(){


if(!audioCtx){


audioCtx =
new(
window.AudioContext ||
window.webkitAudioContext
)();


}


if(audioCtx.state==="suspended"){

audioCtx.resume();

}


}



document.addEventListener(
"click",
initAudio,
{once:true}
);






function playBeep(){


if(!audioCtx)
return;



let now =
audioCtx.currentTime;



function beep(t){


let osc =
audioCtx.createOscillator();


let gain =
audioCtx.createGain();



osc.type="square";


osc.frequency.setValueAtTime(
2000,
t
);



gain.gain.setValueAtTime(
0,
t
);



gain.gain.linearRampToValueAtTime(
0.7,
t+0.01
);



gain.gain.linearRampToValueAtTime(
0,
t+0.12
);



osc.connect(gain);

gain.connect(
audioCtx.destination
);



osc.start(t);

osc.stop(t+0.12);


}



beep(now);

beep(now+0.15);



}









/* =========================
   CAMERA START
========================= */


async function startScanner(){



if(scanning)
return;




try{


scannerDiv.innerHTML="";



videoElement =
document.createElement(
"video"
);



videoElement.setAttribute(
"playsinline",
true
);



videoElement.style.width="100%";

videoElement.style.height="100%";

videoElement.style.objectFit="cover";



scannerDiv.appendChild(
videoElement
);





const devices =
await codeReader
.listVideoInputDevices();





if(devices.length===0){


showMessage(
"Нема камера",
true
);


return;


}




/*
Prefer back camera
*/


let selectedCamera =
devices.find(
camera =>
camera.label
.toLowerCase()
.includes("back")
);




if(!selectedCamera){


selectedCamera =
devices[
devices.length-1
];


}







await codeReader.decodeFromVideoDevice(


selectedCamera.deviceId,


videoElement,


(result,error)=>{


if(result){


let value =
result.getText();



handleBarcode(value);



}



}

);



scanning=true;




/*
Get camera track
*/


setTimeout(()=>{


try{


currentTrack =
videoElement
.srcObject
.getVideoTracks()[0];



/*
Continuous autofocus
*/


currentTrack
.applyConstraints({


advanced:[

{

focusMode:
"continuous"

}

]


});



}
catch(e){}



},2000);




showMessage(
"Камера активна"
);



}

catch(error){


console.log(error);


showMessage(
"Грешка при камера",
true
);



}



}








/* =========================
   BARCODE RESULT
========================= */


function handleBarcode(value){



if(value===lastScanned)
return;



lastScanned=value;




setTimeout(()=>{


lastScanned="";


},2000);





barcodeInput.value=value;



playBeep();




scannerDiv.classList.add(
"success"
);



setTimeout(()=>{


scannerDiv.classList.remove(
"success"
);


},300);




showMessage(
"✔ "+value
);



}









/* =========================
   STOP CAMERA
========================= */


function stopScanner(){



try{


codeReader.reset();



scanning=false;



showMessage(
"Камера стопирана"
);



}

catch(e){}



}









/* =========================
   TORCH
========================= */


async function toggleTorch(){



try{


if(!currentTrack){


showMessage(
"Камера не е активна",
true
);


return;

}



let capabilities =
currentTrack
.getCapabilities();



if(!capabilities.torch){


showMessage(
"Флеш не е поддржан",
true
);


return;


}




let enabled =
currentTrack
.torchEnabled || false;




await currentTrack
.applyConstraints({

advanced:[

{

torch:
!enabled

}

]

});




}


catch(e){



showMessage(
"Флеш грешка",
true
);



}



}







/* =========================
   BUTTONS
========================= */


document
.getElementById(
"startCamera"
)
.onclick =
startScanner;




document
.getElementById(
"stopCamera"
)
.onclick =
stopScanner;





document
.getElementById(
"torch"
)
.onclick =
toggleTorch;






window.onload=()=>{


startScanner();


};



</script>
<script>


/* =========================
   INVENTORY DATABASE
========================= */


let inventory =
JSON.parse(
localStorage.getItem("inventory")
)
||
[];




const tableBody =
document.querySelector(
"#inventoryTable tbody"
);



const locationInput =
document.getElementById(
"location"
);



const podrumCheckbox =
document.getElementById(
"podrum"
);



const sistemSalaCheckbox =
document.getElementById(
"sistemsala"
);



const conditionInput =
document.getElementById(
"condition"
);



const descriptionInput =
document.getElementById(
"description"
);





/* =========================
   LOCATION CHECKBOX LOGIC
========================= */


function updateLocation(){


if(podrumCheckbox.checked){


locationInput.value =
"Подрум";


locationInput.disabled=true;


locationInput.removeAttribute(
"required"
);



sistemSalaCheckbox.checked=false;


}



else if(sistemSalaCheckbox.checked){


locationInput.value =
"Систем сала";


locationInput.disabled=true;


locationInput.removeAttribute(
"required"
);



podrumCheckbox.checked=false;


}



else{


locationInput.value="";


locationInput.disabled=false;


locationInput.setAttribute(
"required",
true
);



}



}





podrumCheckbox
.addEventListener(
"change",
updateLocation
);



sistemSalaCheckbox
.addEventListener(
"change",
updateLocation
);









/* =========================
   DISPLAY TABLE
========================= */


function renderTable(){



tableBody.innerHTML="";



inventory.forEach(item=>{



let row =
document.createElement(
"tr"
);



row.innerHTML=`

<td>
${item.barcode}
</td>


<td>
${item.location}
</td>


<td>
${item.condition}
</td>


<td>
${item.description}
</td>

`;



tableBody.appendChild(row);



});



}





renderTable();








/* =========================
   GOOGLE APPS SCRIPT URL
========================= */


const webAppUrl =

"https://script.google.com/macros/s/AKfycbxb1pxZxUrmITmtLZF6wIaCQaJ9pFYA2AqbP0HMBgAA5zp2RO-fC0Ik0aSk4R_0J7JeMQ/exec";









/* =========================
   SAVE INVENTORY
========================= */


document
.getElementById(
"inventoryForm"
)
.addEventListener(
"submit",
async function(e){



e.preventDefault();




const entry={


barcode:
document.getElementById(
"barcode"
).value,



location:
locationInput.value,



condition:
conditionInput.value,



description:
descriptionInput.value,



timestamp:
new Date()
.toLocaleString(
"mk-MK"
)


};






if(!entry.barcode){


showMessage(
"Скенирај баркод!",
true
);


return;


}






if(!entry.location){


showMessage(
"Внесете локација!",
true
);


return;


}





if(!entry.condition){


showMessage(
"Изберете состојба!",
true
);


return;


}






/*
SAVE LOCAL FIRST
*/


inventory.push(entry);



localStorage.setItem(

"inventory",

JSON.stringify(
inventory

)

);



renderTable();








/*
SEND TO GOOGLE SHEET
*/


try{


await fetch(

webAppUrl,

{


method:"POST",


mode:"no-cors",


headers:{


"Content-Type":
"application/json"


},


body:
JSON.stringify(entry)



}

);



showMessage(
"✔ Зачувано"
);



}


catch(error){


console.log(error);



showMessage(
"Локално зачувано - нема интернет",
true
);



}







/*
RESET FORM
*/


document
.getElementById(
"inventoryForm"
)
.reset();



locationInput.disabled=false;


locationInput.setAttribute(
"required",
true
);



barcodeInput.value="";



lastScanned="";



});





</script>
